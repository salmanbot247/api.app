name: The App Dissector Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛠️ Install Reverse Engineering Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk wget unzip zip
          # JADX Decompiler Install kar rahe hain
          wget https://github.com/skylot/jadx/releases/download/v1.4.7/jadx-1.4.7.zip
          unzip jadx-1.4.7.zip -d jadx
          sudo chmod +x jadx/bin/jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          
          # Python libraries
          pip install pyTelegramBotAPI

      - name: 🤖 Start Dissector Bot
        timeout-minutes: 350
        run: python bot.py

      - name: Auto-Restart Trigger 🔄
        if: always()
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/run.yml/dispatches \
          -d '{"ref":"main"}'

