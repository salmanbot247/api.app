name: The App Dissector (JazzDrive Edition)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛠️ Install Hacker Tools (JADX + Playwright)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk wget unzip zip gnupg
          
          # JADX Decompiler Install
          wget https://github.com/skylot/jadx/releases/download/v1.4.7/jadx-1.4.7.zip
          unzip jadx-1.4.7.zip -d jadx
          sudo chmod +x jadx/bin/jadx
          sudo ln -s $(pwd)/jadx/bin/jadx /usr/local/bin/jadx
          
          # Python libraries
          pip install pyTelegramBotAPI playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 🔓 Unlock The Vault (Decrypt Login)
        env:
          VAULT_PASS: ${{ secrets.VAULT_PASS }}
        run: |
          if [ -f "state.json.gpg" ]; then
            gpg --quiet --batch --yes --decrypt --passphrase="$VAULT_PASS" --output state.json state.json.gpg
          fi

      - name: 🤖 Start Dissector Bot
        timeout-minutes: 350
        run: python bot.py

      - name: 🔐 Lock The Vault (Encrypt Login)
        if: always()
        env:
          VAULT_PASS: ${{ secrets.VAULT_PASS }}
        run: |
          if [ -f "state.json" ]; then
            gpg --quiet --batch --yes --symmetric --passphrase="$VAULT_PASS" --cipher-algo AES256 state.json
          fi

      - name: Save Encrypted Sessions
        if: always()
        run: |
          git config --global user.name "Ghost Bot"
          git config --global user.email "bot@github.com"
          git add *.gpg || true
          git commit -m "Auto-Saved Encrypted Logins" || exit 0
          git push

      - name: Auto-Restart Trigger 🔄
        if: always()
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/run.yml/dispatches \
          -d '{"ref":"main"}'
